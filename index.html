<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Death Note</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Feather Pen Cursor */
        * {
            cursor: url('https://cur.cursors-4u.net/others/oth-2/oth195.cur'), auto !important;
        }

        body {
            background-color: #050505;
            color: #d1d1d1;
            font-family: 'Pirata One', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle, #1a0000 0%, #050505 80%);
            overflow-x: hidden;
        }

        /* Overlay for Audio Start */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: 1.5s;
        }

        #start-btn {
            background: none;
            border: 2px solid #8b0000;
            color: #8b0000;
            font-size: 2.5rem;
            font-family: 'Pirata One', cursive;
            padding: 15px 40px;
            text-shadow: 0 0 10px red;
            box-shadow: inset 0 0 15px #8b0000;
            cursor: pointer;
        }

        #start-btn:hover {
            background: #8b0000;
            color: white;
            box-shadow: 0 0 40px #ff0000;
        }

        h1 {
            font-size: 4.5rem;
            color: #8b0000;
            text-shadow: 0 0 25px rgba(139, 0, 0, 0.9);
            margin-top: 50px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        #names-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .name-entry {
            font-family: 'Dancing Script', cursive; /* Blood Ink look */
            font-size: 2.8rem;
            color: #990000; /* Deep Blood Red */
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            border-bottom: 1px solid #1a0000;
            text-shadow: 2px 2px 5px black;
        }

        /* Writing Animation */
        .writing {
            animation: typing 4s steps(40, end) forwards;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        .gold {
            color: #ffd700 !important;
            text-shadow: 0 0 20px #ffd700, 2px 2px 5px black !important;
        }

        .loading { font-size: 1.2rem; color: #333; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">ENTER THE NOTE</button>
    </div>

    <h1>Death Note</h1>

    <audio id="bg-audio" loop>
        <source src="Death Note - (L's Theme A) Music.mp3" type="audio/mpeg">
    </audio>

    <div id="names-container">
        <div class="loading">Fetching Souls...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbXcekk4NWv8pvLLdGFSfD9vPTGRtA3JZDeEJ0dBDoIrvfg1I97fWZiDTKIQ7zTzKh/exec";
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const audio = document.getElementById('bg-audio');

        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1500);
            audio.volume = 0.6;
            audio.play();
            fetchNames();
        });

        async function fetchNames() {
            const container = document.getElementById('names-container');
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();
                container.innerHTML = ''; 

                data.forEach((item, index) => {
                    setTimeout(() => {
                        const div = document.createElement('div');
                        div.className = 'name-entry writing';
                        
                        if(item.status && item.status.toLowerCase() === 'gold') {
                            div.classList.add('gold');
                        }
                        
                        div.innerText = item.username;
                        container.appendChild(div);
                    }, index * 4500); // 4.5 seconds gap between each soul
                });
            } catch (error) {
                container.innerHTML = "<div class='loading' style='color:red;'>Spirit Connection Failed. Check Brave Shields.</div>";
            }
        }
    </script>
</body>
</html>
