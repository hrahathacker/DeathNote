<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Death Note</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Feather Pen Cursor */
        * {
            cursor: url('https://cur.cursors-4u.net/others/oth-2/oth195.cur'), auto !important;
        }

        body {
            background-color: #050505;
            color: #d1d1d1;
            font-family: 'Pirata One', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle, #1a0000 0%, #050505 80%);
            overflow-x: hidden;
        }

        /* Start Screen Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: 1s;
        }

        #start-btn {
            background: none;
            border: 2px solid #8b0000;
            color: #8b0000;
            font-family: 'Pirata One', cursive;
            font-size: 2.5rem;
            padding: 10px 30px;
            cursor: pointer;
            text-shadow: 0 0 10px red;
            transition: 0.3s;
        }

        #start-btn:hover {
            background: #8b0000;
            color: white;
            box-shadow: 0 0 30px #8b0000;
        }

        h1 {
            font-size: 4rem;
            color: #8b0000;
            text-shadow: 0 0 20px rgba(139, 0, 0, 0.8);
            margin-top: 50px;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.4; }
        }

        #names-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .name-entry {
            font-family: 'Dancing Script', cursive; /* Blood Ink look */
            font-size: 2.2rem;
            color: #8b0000; /* Blood Color */
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            border-right: 2px solid transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Writing Animation */
        .writing {
            animation: typing 3s steps(30, end) forwards;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* Gold Blood Effect */
        .gold {
            color: #ffd700 !important;
            text-shadow: 0 0 15px #ffd700, 2px 2px 5px black;
        }

        .loading {
            font-size: 1.5rem;
            color: #444;
        }

        /* Rain/Static effect for horror feel */
        .static {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicKgR6S7L3m/giphy.gif');
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="static"></div>

    <div id="overlay">
        <button id="start-btn">ENTER THE NOTE</button>
    </div>

    <h1>Death Note</h1>
    
    <audio id="horror-bg" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div id="names-container">
        <div class="loading">Fetching Souls...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbXcekk4NWv8pvLLdGFSfD9vPTGRtA3JZDeEJ0dBDoIrvfg1I97fWZiDTKIQ7zTzKh/exec";
        const audio = document.getElementById('horror-bg');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');

        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
            audio.play();
            fetchNames();
        });

        async function fetchNames() {
            const container = document.getElementById('names-container');
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();
                container.innerHTML = ''; 

                data.forEach((item, index) => {
                    setTimeout(() => {
                        const div = document.createElement('div');
                        div.classList.add('name-entry');
                        div.classList.add('writing'); // Writing animation
                        
                        if(item.status && item.status.toLowerCase() === 'gold') {
                            div.classList.add('gold');
                        }
                        
                        div.innerText = item.username;
                        container.appendChild(div);
                    }, index * 3500); // 3.5 seconds delay between names
                });
            } catch (error) {
                container.innerHTML = "<div class='loading'>Failed to summon spirits. Turn off Brave Shields.</div>";
            }
        }
    </script>
</body>
</html>
