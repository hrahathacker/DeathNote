<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Death Note</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #d1d1d1;
            font-family: 'Pirata One', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            background-image: radial-gradient(circle, #1a0000 0%, #050505 80%);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: 1s;
        }

        #start-btn {
            background: none;
            border: 2px solid #8b0000;
            color: #8b0000;
            font-size: 2rem;
            font-family: 'Pirata One', cursive;
            padding: 12px 30px;
            text-shadow: 0 0 10px red;
            box-shadow: inset 0 0 10px #8b0000;
        }

        h1 {
            font-size: 3.5rem;
            color: #8b0000;
            text-shadow: 0 0 20px rgba(139, 0, 0, 0.9);
            margin: 30px 0 10px 0;
        }

        .subtitle {
            font-style: italic;
            color: #666;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 25px;
        }

        #names-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .name-entry {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #990000;
            padding: 5px 0;
            border-bottom: 1px solid #1a0000;
            position: relative;
            width: fit-content;
            min-width: 100px;
        }

        /* Target User Animation */
        .target-user {
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid transparent;
            animation: typing 4s steps(30, end) forwards;
        }

        /* The Feather Pen moving over the name */
        .target-user::after {
            content: '🖋️'; /* Feather Pen Emoji as Pen */
            position: absolute;
            right: -25px;
            top: 0;
            font-size: 1.5rem;
            animation: pen-move 4s steps(30, end) forwards;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes pen-move {
            0% { opacity: 1; }
            99% { opacity: 1; }
            100% { opacity: 0; } /* Pen disappears at the end */
        }

        .gold {
            color: #ffd700 !important;
            text-shadow: 0 0 15px #ffd700, 1px 1px 3px black !important;
        }

        .loading { font-size: 1rem; color: #444; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">READ THE NOTE</button>
    </div>

    <h1>Death Note</h1>
    <p class="subtitle">The humans whose names are written here shall die...</p>

    <audio id="bg-audio" loop>
        <source src="Death Note - (L's Theme A) Music.mp3" type="audio/mpeg">
    </audio>

    <div id="names-container">
        <div class="loading">Summoning souls...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbXcekk4NWv8pvLLdGFSfD9vPTGRtA3JZDeEJ0dBDoIrvfg1I97fWZiDTKIQ7zTzKh/exec";
        
        // URL se name uthane ke liye logic (?name=Vivek)
        const urlParams = new URLSearchParams(window.location.search);
        const targetName = urlParams.get('name')?.toLowerCase();

        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const audio = document.getElementById('bg-audio');

        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
            audio.volume = 0.5;
            audio.play();
            fetchNames();
        });

        async function fetchNames() {
            const container = document.getElementById('names-container');
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();
                container.innerHTML = ''; 

                data.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = 'name-entry';
                    
                    if(item.status && item.status.toLowerCase() === 'gold') {
                        div.classList.add('gold');
                    }
                    
                    div.innerText = item.username;

                    // CHECK: Agar ye wahi user hai jisne link khola hai
                    if (targetName && item.username.toLowerCase() === targetName) {
                        div.classList.add('target-user');
                    }
                    
                    container.appendChild(div);
                });
            } catch (error) {
                container.innerHTML = "<div class='loading' style='color:red;'>Connection Blocked. Turn off Brave Shields.</div>";
            }
        }
    </script>
</body>
</html>
